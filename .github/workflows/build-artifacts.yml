name: Build Artifacts

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x86
            runner: windows-latest
            rid: win-x86
            package_name: Kintsugi.MidiPlayer-win-x86-portable
            package_ext: zip
            mac_app_bundle: false
          - label: Windows x64
            runner: windows-latest
            rid: win-x64
            package_name: Kintsugi.MidiPlayer-win-x64-portable
            package_ext: zip
            mac_app_bundle: false
          - label: Windows ARM64
            runner: windows-11-arm
            rid: win-arm64
            package_name: Kintsugi.MidiPlayer-win-arm64-portable
            package_ext: zip
            mac_app_bundle: false
          - label: Linux x64
            runner: ubuntu-24.04
            rid: linux-x64
            package_name: Kintsugi.MidiPlayer-linux-x64-portable
            package_ext: tar.gz
            mac_app_bundle: false
          - label: Linux ARM
            runner: ubuntu-24.04-arm
            rid: linux-arm
            package_name: Kintsugi.MidiPlayer-linux-arm-portable
            package_ext: tar.gz
            mac_app_bundle: false
          - label: Linux ARM64
            runner: ubuntu-24.04-arm
            rid: linux-arm64
            package_name: Kintsugi.MidiPlayer-linux-arm64-portable
            package_ext: tar.gz
            mac_app_bundle: false
          - label: macOS Intel
            runner: macos-15-intel
            rid: osx-x64
            package_name: Kintsugi.MidiPlayer-osx-x64
            package_ext: tar.gz
            mac_app_bundle: true
          - label: macOS Apple Silicon
            runner: macos-15
            rid: osx-arm64
            package_name: Kintsugi.MidiPlayer-osx-arm64
            package_ext: tar.gz
            mac_app_bundle: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install JUCE Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev \
            libfreetype-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev

      - name: Restore
        run: dotnet restore src/MidiPlayer.App/MidiPlayer.App.csproj --runtime ${{ matrix.rid }}

      - name: Publish
        if: runner.os == 'macOS'
        run: |
          dotnet publish src/MidiPlayer.App/MidiPlayer.App.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:CreateMacAppBundle=${{ matrix.mac_app_bundle }} \
            -o artifacts/publish/${{ matrix.rid }}

      - name: Build Linux portable package
        if: runner.os == 'Linux'
        run: |
          bash scripts/publish-portable-package.sh ${{ matrix.rid }}

      - name: Build Windows portable package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          scripts/publish-windows-portable.ps1 -Rid ${{ matrix.rid }}

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        run: |
          package_root="artifacts/package/${{ matrix.package_name }}"
          archive_path="artifacts/dist/${{ matrix.package_name }}.${{ matrix.package_ext }}"
          app_bundle="artifacts/macos/Release/${{ matrix.rid }}/Kintsugi Midi Player.app"

          mkdir -p "$package_root" artifacts/dist
          cp -a "$app_bundle" "$package_root/"
          cp README.md LICENSE "$package_root/"

          tar -C artifacts/package -czf "$archive_path" "${{ matrix.package_name }}"
          shasum -a 256 "$archive_path" > "$archive_path.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package_name }}
          path: artifacts/dist/${{ matrix.package_name }}*
          if-no-files-found: error
          compression-level: 0

  release:
    name: Create Release
    needs: publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/R')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          pattern: Kintsugi.MidiPlayer-*
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          shopt -s nullglob
          files=(release-assets/*)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No release assets were downloaded."
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${files[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${files[@]}" \
              --verify-tag \
              --title "$TAG_NAME" \
              --generate-notes
          fi
